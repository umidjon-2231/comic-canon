name: lint

on:
  push:
  pull_request:

jobs:
  continuity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install -r tools/requirements.txt
      - name: Lint the worked example
        run: python tools/lint.py examples/the-wardens-coin
